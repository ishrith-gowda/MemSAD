# mem0 baseline config
vector_store:
  provider: chroma
  config:
    collection_name: memory_agent_dev
    path: ./data/cache/chroma
embedder:
  provider: openai
  config:
    model: text-embedding-3-small
    embedding_dims: 1536
llm:
  provider: openai
  config:
    model: gpt-4o-mini
    temperature: 0.1
    max_tokens: 2000
version: v1.1
